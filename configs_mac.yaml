git:
  .gitconfig_main:  ~/.gitconfig
  .gitconfig_dskwrite: ~/.gitconfig_dskwrite

iterm2:
  com.googlecode.iterm2.plist: ~/Library/Preferences/com.googlecode.iterm2.plist

nushell:
  env.nu: ~/Library/Application Support/nushell/env.nu
  config.nu: ~/Library/Application Support/nushell/config.nu

powershell:
  profile.ps1: ~/.config/powershell/Microsoft.PowerShell_profile.ps1

zsh:
  .zprofile: ~/.zprofile
  .zshrc: ~/.zshrc

